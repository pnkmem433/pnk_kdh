[env:tasmota-smartplug]
extends                 = env:tasmota
; Run the local post-build automation after Tasmota finishes generating
; the firmware artifact. The Python script handles:
; 1) version prompt
; 2) Google Drive archive copy
; 3) OTA server upload
; 4) server-side latest symlink refresh trigger
extra_scripts           = ${env:tasmota.extra_scripts}
                          post:pio-tools/copy-gdrive-firmware.py
build_flags             = ${env:tasmota.build_flags}
                          -DUSE_SMARTPLUG_CUSTOM
; Visible image label shown in the built firmware information.
                          -DCODE_IMAGE_STR='"pnksolution-automation call server automation test"'
; Leave OTA_URL empty here and manage the real OTA URL from Tasmota Web UI / Console.
                          -DOTA_URL='""'
; Local archive folder used by the post-build Python script.
custom_gdrive_copy_dir  = G:\.shortcut-targets-by-id\1eOl--DT4rr56gYI69AsP3L1Eyd-glIoh\3D 프린터 사용방법 인수인계\촬영 사진 영상\강동현\Tasmota 관련 파일\tasmota 펌웨어 버전 폴더
; Base filename used by the automation when composing vN_tasmota-smartplug.bin.gz.
custom_gdrive_copy_name = tasmota-smartplug.bin.gz
