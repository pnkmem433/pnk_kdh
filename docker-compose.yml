# ===========================================
# Docker Compose configuration
#
# 목적:
# - 이 저장소의 정적 웹 페이지를 nginx 컨테이너로 서비스한다.
# - self-hosted runner 배포 후 동일 설정으로 재기동할 수 있게 한다.
#
# 운영 메모:
# - 호스트 8080 포트는 Jenkins 가 사용 중이라 8090:80 매핑을 사용한다.
# - 컨테이너 이름을 고정해 워크플로우에서 정리/확인하기 쉽게 했다.
# ===========================================

version: '3.8'

services:
  # 단일 nginx 웹 서비스.
  # 현재 디렉토리의 Dockerfile 을 기준으로 이미지를 빌드한다.
  my-web-docker:
    build: .

    # 호스트 8090 -> 컨테이너 80 매핑.
    # 브라우저에서는 http://<server>:8090 으로 접근한다.
    ports:
      - "8090:80"

    # 컨테이너가 비정상 종료되면 Docker 가 자동 재시작을 시도한다.
    restart: always

    # 워크플로우에서 동일 이름으로 기존 컨테이너를 찾아 정리할 수 있도록 고정 이름 사용.
    container_name: lattepanda-web-docker
