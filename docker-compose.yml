# ===========================================
# Docker Compose 설정 파일
# 목적: 도커 컨테이너들을 오케스트레이션 (실행 및 관리)
# 버전: 3.8 (현재 가장 안정적인 버전)
# ===========================================

version: '3.8'

# 서비스 정의: 실행할 컨테이너들
services:
  # 서비스 이름: my-web-docker
  my-web-docker:
    # 현재 디렉토리의 Dockerfile을 사용해서 빌드
    build: .

    # 포트 매핑: [호스트:컨테이너]
    # 호스트의 8090번 포트 → 컨테이너의 80번 포트 (nginx 기본 포트)
    # ※ 서버의 8080번은 Jenkins가 사용 중이므로 8090번 사용
    ports:
      - "8090:80"

    # 재시작 정책: 컨테이너가 죽으면 자동으로 다시 시작
    restart: always

    # (선택) 컨테이너 이름 지정
    container_name: lattepanda-web-docker

# ===========================================
# 사용법:
# docker compose up -d     : 백그라운드에서 실행
# docker compose down      : 컨테이너 중지 및 제거
# docker compose logs      : 로그 확인
# ===========================================
