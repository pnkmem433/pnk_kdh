name: "Zero-Touch Auto Deploy (Method 3: Safe Build)"

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Stage to Temp and Verify
        # 블로그의 'comment_line_break: |' 규칙 적용
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          TEMP_PATH="./temp_build"
          
          rm -rf $TEMP_PATH
          mkdir -p $TEMP_PATH
          
          echo "Staging only required folders to temp..."
          cp -r .github/workflows $TEMP_PATH/ 2>/dev/null || true
          cp -r automation $TEMP_PATH/ 2>/dev/null || true
          cp -r github_동작지침 $TEMP_PATH/ 2>/dev/null || true
          cp index.html $TEMP_PATH/ 2>/dev/null || true
          
          # index.html 검사는 본 저장소에는 없으므로 선택적으로 수행
          if [ -f "$TEMP_PATH/index.html" ]; then
            echo "index.html exists as expected."
          else
            echo "index.html not found; skipping index validation."
          fi
          
          echo "Verification passed."

      - name: Final Deploy to Nginx
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          TARGET_PATH="/var/www/html/$REPO_NAME"
          TEMP_PATH="./temp_build"
          
          if [ ! -d "$TARGET_PATH" ]; then
            sudo mkdir -p "$TARGET_PATH"
            sudo chown -R $USER:$USER "$TARGET_PATH"
          fi
          
          rsync -av --delete --exclude='.git*' $TEMP_PATH/ "$TARGET_PATH/"

      - name: Finish
        run: echo "Safe deployment completed successfully!"
