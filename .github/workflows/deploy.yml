name: Zero-Touch Auto Deploy (Method 3: Safe Build)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Stage to Temp and Verify
        run: |
          # 1. 환경 설정
          REPO_NAME="${{ github.event.repository.name }}"
          TEMP_PATH="./temp_build"
          
          # 2. 깨끗한 temp 폴더 준비
          rm -rf $TEMP_PATH
          mkdir -p $TEMP_PATH
          
          # 3. temp 폴더로 모든 파일 복사 (1차 빌드)
          echo "Staging files to temp..."
          cp -r ./* $TEMP_PATH/
          
          # 4. 검증 (Safety Check)
          # index.html 파일이 제대로 복사됐는지 확인합니다.
          if [ ! -f "$TEMP_PATH/index.html" ]; then
            echo "❌ CRITICAL ERROR: index.html is missing! Aborting deployment."
            exit 1
          fi
          
          echo "✅ Verification passed. Ready to sync."

      - name: Final Deploy to Nginx
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          TARGET_PATH="/var/www/html/$REPO_NAME"
          TEMP_PATH="./temp_build"
          
          # 서버 폴더 권한 확인 및 생성
          if [ ! -d "$TARGET_PATH" ]; then
            sudo mkdir -p "$TARGET_PATH"
            sudo chown -R $USER:$USER "$TARGET_PATH"
          fi
          
          # 검증된 temp 폴더 내용을 실제 경로로 동기화
          rsync -av --delete --exclude='.git*' $TEMP_PATH/ "$TARGET_PATH/"

      - name: Finish
        run: echo "Safe deployment completed successfully!"
