name: Integrated Folder Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # 서브모듈 내용까지 포함하여 가져오기
          submodules: 'recursive'

      - name: Sync Only Selected Folders
        run: |
          # 1. 기존 dist 폴더가 있다면 삭제하고 새로 생성
          rm -rf ./dist
          mkdir -p ./dist
          
          # 2. 배포하고 싶은 특정 폴더만 dist 폴더로 복사
          # 폴더가 존재하지 않을 경우를 대비해 처리 추가
          [ -d "./automation" ] && cp -r ./automation ./dist/
          [ -d "./smart_plug" ] && cp -r ./smart_plug ./dist/
          
          # 3. 라떼판다의 실제 Nginx 경로로 최종 동기화
          # --delete 옵션으로 서버에 남아있는 불필요한 파일 삭제
          rsync -av --delete ./dist/ /var/www/html/pnk_kdh/
          
      - name: Finish
        run: echo "Deployment completed for automation and smart_plug folders."
