# ===========================================
# GitHub Actions Deploy Workflow
# 파일명: .github/workflows/deploy.yml
#
# 목적:
# - main 브랜치에 변경이 push 되면 self-hosted runner 에서 자동 배포한다.
# - 정적 파일은 /var/www/html/<repo-name> 경로에 배치한다.
# - Docker Compose 는 홈 디렉토리 쪽 작업 폴더에서 실행해 경로 접근 문제를 피한다.
#
# 최근 반영된 운영 이슈:
# - /var/www/html 아래의 compose 파일을 Docker 가 직접 읽지 못한 적이 있어
#   $HOME/docker-deploy-<repo-name> 에 복사한 뒤 그 위치에서 compose 를 실행한다.
# - 서버의 8080 포트는 Jenkins 가 사용하므로 웹 컨테이너는 8090 포트를 사용한다.
# ===========================================

name: "Zero-Touch Auto Deploy (Method 3: Safe Build)"

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, alpha-server]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Stage to Temp and Verify
        run: |
          TEMP_PATH="./temp_build"

          rm -rf "$TEMP_PATH"
          mkdir -p "$TEMP_PATH"

          # 루트 전체를 우선 스테이징한 뒤, 배포에 필요 없는 항목만 제외한다.
          cp -r ./* "$TEMP_PATH/" 2>/dev/null || true

          rm -rf "$TEMP_PATH/.github"
          rm -rf "$TEMP_PATH/.venv"
          rm -rf "$TEMP_PATH/venv"
          rm -rf "$TEMP_PATH/README.md"
          rm -rf "$TEMP_PATH/site"

          if [ -s "$TEMP_PATH/index.html" ]; then
            echo "index.html verification passed."
          else
            echo "Required file missing: index.html"
            exit 1
          fi

          echo "Staging and verification completed."

      - name: Final Deploy to Nginx
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          TARGET_PATH="/var/www/html/$REPO_NAME"
          TEMP_PATH="./temp_build"

          if [ ! -d "$TARGET_PATH" ]; then
            sudo mkdir -p "$TARGET_PATH"
            sudo chown -R "$USER:$USER" "$TARGET_PATH"
          fi

          rsync -av --delete \
            --exclude='.git*' \
            --exclude='*.pyc' \
            --exclude='__pycache__' \
            "$TEMP_PATH/" "$TARGET_PATH/"

      - name: Run Docker Compose
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          TARGET_DIR="/var/www/html/$REPO_NAME"

          echo "Repository name: $REPO_NAME"
          echo "Target directory: $TARGET_DIR"
          echo "Home directory: $HOME"

          WORK_DIR="$HOME/docker-deploy-$REPO_NAME"
          echo "Work directory: $WORK_DIR"

          rm -rf "$WORK_DIR"
          mkdir -p "$WORK_DIR"

          echo "Copying files from $TARGET_DIR to $WORK_DIR..."
          cp -r "$TARGET_DIR"/* "$WORK_DIR/" 2>/dev/null || true

          cd "$WORK_DIR"

          echo "Current directory: $(pwd)"
          echo "Files in directory:"
          ls -la

          COMPOSE_FILE="$WORK_DIR/docker-compose.yml"
          DOCKERFILE="$WORK_DIR/Dockerfile"
          INDEX_FILE="$WORK_DIR/index.html"

          echo "Checking files in work directory:"
          echo "Compose file: $COMPOSE_FILE"
          echo "Dockerfile: $DOCKERFILE"
          echo "Index file: $INDEX_FILE"

          if [ ! -f "$COMPOSE_FILE" ]; then
            echo "Error: docker-compose.yml not found at $COMPOSE_FILE"
            ls -la "$WORK_DIR/"
            exit 1
          fi

          if [ ! -f "$DOCKERFILE" ]; then
            echo "Error: Dockerfile not found at $DOCKERFILE"
            exit 1
          fi

          if [ ! -f "$INDEX_FILE" ]; then
            echo "Error: index.html not found at $INDEX_FILE"
            exit 1
          fi

          echo "All required files found. Proceeding with Docker deployment..."

          if command -v docker-compose &> /dev/null; then
            DOCKER_COMPOSE_CMD="docker-compose"
            echo "Using docker-compose (standalone version)"
          elif docker compose version &> /dev/null 2>&1; then
            DOCKER_COMPOSE_CMD="docker compose"
            echo "Using docker compose (plugin version)"
          else
            echo "Docker Compose not found. Installing..."
            sudo curl -L "https://github.com/docker/compose/releases/download/v2.24.0/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
            DOCKER_COMPOSE_CMD="docker-compose"
          fi

          echo "Using command: $DOCKER_COMPOSE_CMD"
          echo "Compose file path: $COMPOSE_FILE"
          echo "Working directory: $(pwd)"

          echo "Removing previous deployment container if it exists..."
          sudo docker rm -f lattepanda-web-docker 2>/dev/null || true

          echo "Checking for containers already publishing port 8090..."
          PORT_8090_CONTAINERS=$(sudo docker ps -q --filter "publish=8090")
          if [ -n "$PORT_8090_CONTAINERS" ]; then
            echo "Stopping containers using host port 8090: $PORT_8090_CONTAINERS"
            sudo docker stop $PORT_8090_CONTAINERS || true
            sudo docker rm $PORT_8090_CONTAINERS || true
          else
            echo "No running Docker containers are using host port 8090."
          fi

          echo "Stopping existing compose project..."
          sudo $DOCKER_COMPOSE_CMD -f "$COMPOSE_FILE" down || true

          echo "Starting deployment with Docker compose..."
          sudo $DOCKER_COMPOSE_CMD -f "$COMPOSE_FILE" up -d --build

          echo "Deployment completed in home directory."

      - name: Finish and Verify
        run: |
          echo "Safe deployment completed successfully!"
          echo "Docker container should be running on port 8090"
          sudo docker ps --filter "name=lattepanda-web-docker" || echo "Docker verification completed"
