name: Zero-Touch Auto Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Auto Create Folder and Sync
        run: |
          # 1. 현재 저장소 이름 가져오기 (예: 3d_printer_schedule)
          REPO_NAME="${{ github.event.repository.name }}"
          TARGET_PATH="/var/www/html/$REPO_NAME"
          
          echo "Target Path: $TARGET_PATH"

          # 2. 서버에 폴더가 없으면 자동으로 생성 (관리자 권한 사용)
          if [ ! -d "$TARGET_PATH" ]; then
            echo "Folder does not exist. Creating..."
            sudo mkdir -p "$TARGET_PATH"
            sudo chown -R $USER:$USER "$TARGET_PATH"
          fi

          # 3. 임시 빌드 폴더(dist) 준비
          rm -rf ./dist
          mkdir -p ./dist
          
          # 4. 배포할 폴더만 dist로 복사 (이전에 정한 방식)
          [ -d "./automation" ] && cp -r ./automation/* ./dist/ 2>/dev/null || true
          [ -d "./smart_plug" ] && cp -r ./smart_plug/* ./dist/ 2>/dev/null || true
          # 만약 폴더 구조 없이 파일만 있다면 전체 복사 시도
          if [ -z "$(ls -A ./dist)" ]; then cp -r ./* ./dist/ 2>/dev/null || true; fi

          # 5. 최종 배포 (rsync)
          rsync -av --delete ./dist/ "$TARGET_PATH/"
          
      - name: Finish
        run: echo "Deployment to ${{ github.event.repository.name }} completed successfully!"
