# ===========================================
# GitHub Actions 자동 배포 워크플로우
# 파일명: deploy.yml
# 목적: main 브랜치 push 시 자동으로 서버에 배포
# 특징: 블랙리스트 방식 + 안전장치 내장
# ===========================================

# 워크플로우 이름 (GitHub Actions에서 표시됨)
name: "Zero-Touch Auto Deploy (Method 3: Safe Build)"

# ===========================================
# 트리거 설정: 언제 이 워크플로우가 실행될지 정의
# ===========================================
on:
  # main 브랜치에 push가 발생할 때 실행
  push:
    branches:
      - main

# ===========================================
# 작업 정의: 실제 실행할 작업들
# ===========================================
jobs:
  # 작업 이름: deploy
  deploy:
    # 실행 환경: self-hosted 러너 + alpha-server 레이블
    # 이 레이블이 있는 러너에서만 실행됨
    runs-on: [self-hosted, alpha-server]

    # ===========================================
    # 실행 단계들 (Steps)
    # ===========================================
    steps:
      # 단계 1: 코드 체크아웃
      # GitHub에서 코드를 다운로드하는 단계
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # 서브모듈은 사용하지 않음 (문제 방지)
          submodules: false

      # 단계 2: 임시 폴더 준비 및 검증
      # 배포할 파일들을 준비하고 안전하게 검증
      - name: Stage to Temp and Verify
        run: |
          # ===========================================
          # 임시 빌드 디렉토리 설정
          # ===========================================
          TEMP_PATH="./temp_build"

          # 기존 임시 폴더 삭제 (깔끔한 시작)
          rm -rf $TEMP_PATH
          # 새 임시 폴더 생성
          mkdir -p $TEMP_PATH

          # ===========================================
          # 단계 1: 모든 파일을 임시 폴더로 복사
          # ===========================================
          # 블랙리스트 방식: 일단 모두 복사한 후 불필요한 것만 제거
          # 이렇게 하면 새로운 파일이 추가되어도 자동으로 포함됨
          cp -r ./* $TEMP_PATH/ 2>/dev/null || true

          # ===========================================
          # 단계 2: 배포에서 제외할 파일들 제거 (블랙리스트)
          # ===========================================
          # .github 폴더 제외: 워크플로우 파일들 (서버에 필요 없음)
          rm -rf $TEMP_PATH/.github        # 워크플로우 지시서 제외
          # .venv 폴더 제외: Python 가상환경 (서버에 필요 없음)
          rm -rf $TEMP_PATH/.venv          # 가상환경 폴더 제외
          # README.md 제외: 설명 문서 (웹사이트에 표시할 필요 없음)
          rm -rf $TEMP_PATH/README.md      # 설명문 제외
          # venv 폴더 제외: 또 다른 가상환경 폴더
          rm -rf $TEMP_PATH/venv           # venv 폴더 제외

          # ===========================================
          # 단계 3: 안전장치 - 필수 파일 검증
          # ===========================================
          # index.html이 존재하고 내용이 있는지 확인
          # -s 옵션: 파일이 존재하고 크기가 0보다 큰지 확인
          if [ -s "$TEMP_PATH/index.html" ]; then
            echo " index.html 검증 완료"
          else
            echo " 에러: 필수 파일 누락"
            # 검증 실패 시 배포 중단 (exit 1)
            # 이렇게 하면 잘못된 배포로 서버가 망가지는 것을 방지
            exit 1
          fi

          echo "Verification passed."

      # 단계 3: 최종 배포 실행
      # 검증된 파일들을 실제 서버로 배포
      - name: Final Deploy to Nginx
        run: |
          # ===========================================
          # 배포 경로 설정
          # ===========================================
          # 리포지토리 이름 가져오기 (예: pnk_kdh)
          REPO_NAME="${{ github.event.repository.name }}"
          # Nginx 웹 루트 아래에 리포지토리 이름으로 폴더 생성
          TARGET_PATH="/var/www/html/$REPO_NAME"
          # 임시 빌드 폴더 경로
          TEMP_PATH="./temp_build"

          # ===========================================
          # 대상 폴더가 없으면 생성
          # ===========================================
          if [ ! -d "$TARGET_PATH" ]; then
            # 관리자 권한으로 폴더 생성
            sudo mkdir -p "$TARGET_PATH"
            # 현재 사용자에게 소유권 부여
            sudo chown -R $USER:$USER "$TARGET_PATH"
          fi

          # ===========================================
          # rsync를 사용한 효율적인 파일 동기화
          # ===========================================
          # -a: 아카이브 모드 (권한, 타임스탬프 등 보존)
          # -v: 상세 출력
          # --delete: 임시 폴더에 없는 파일은 서버에서도 삭제
          # --exclude='.git*': .git으로 시작하는 파일들 제외
          # --exclude='*.pyc': Python 캐시 파일 제외
          # --exclude='__pycache__': Python 캐시 폴더 제외
          rsync -av --delete --exclude='.git*' --exclude='*.pyc' --exclude='__pycache__' $TEMP_PATH/ "$TARGET_PATH/"

      # 단계 4: 도커 컨테이너 실행 (홈 디렉토리에서 실행)
      - name: Run Docker Compose
        run: |
          # ===========================================
          # 리포지토리 이름으로 경로 설정
          # ===========================================
          REPO_NAME="${{ github.event.repository.name }}"
          TARGET_DIR="/var/www/html/$REPO_NAME"

          echo "Repository name: $REPO_NAME"
          echo "Target directory: $TARGET_DIR"
          echo "Home directory: $HOME"

          # ===========================================
          # 홈 디렉토리로 작업 디렉토리 생성 (권한 문제 해결)
          # ===========================================
          WORK_DIR="$HOME/docker-deploy-$REPO_NAME"
          echo "Work directory: $WORK_DIR"

          rm -rf "$WORK_DIR"
          mkdir -p "$WORK_DIR"

          # ===========================================
          # /var/www/html에서 홈 디렉토리로 파일 복사
          # ===========================================
          echo "Copying files from $TARGET_DIR to $WORK_DIR..."
          cp -r "$TARGET_DIR"/* "$WORK_DIR/" 2>/dev/null || true

          cd "$WORK_DIR"

          # ===========================================
          # 디버깅: 현재 디렉토리와 파일 목록 확인
          # ===========================================
          echo "Current directory: $(pwd)"
          echo "Files in directory:"
          ls -la

          # ===========================================
          # 필수 파일 존재 확인 (절대 경로로)
          # ===========================================
          COMPOSE_FILE="$WORK_DIR/docker-compose.yml"
          DOCKERFILE="$WORK_DIR/Dockerfile"
          INDEX_FILE="$WORK_DIR/index.html"

          echo "Checking files in work directory:"
          echo "Compose file: $COMPOSE_FILE"
          echo "Dockerfile: $DOCKERFILE"
          echo "Index file: $INDEX_FILE"

          if [ ! -f "$COMPOSE_FILE" ]; then
            echo "Error: docker-compose.yml not found at $COMPOSE_FILE!"
            ls -la "$WORK_DIR/"
            exit 1
          fi

          if [ ! -f "$DOCKERFILE" ]; then
            echo "Error: Dockerfile not found at $DOCKERFILE!"
            exit 1
          fi

          if [ ! -f "$INDEX_FILE" ]; then
            echo "Error: index.html not found at $INDEX_FILE!"
            exit 1
          fi

          echo "All required files found. Proceeding with Docker deployment..."

          # ===========================================
          # 1. 도커 컴포즈 명령어 결정 (호환성 체크)
          # ===========================================
          if command -v docker-compose &> /dev/null; then
            DOCKER_COMPOSE_CMD="docker-compose"
            echo "Using docker-compose (standalone version)"
          elif docker compose version &> /dev/null 2>&1; then
            DOCKER_COMPOSE_CMD="docker compose"
            echo "Using docker compose (plugin version)"
          else
            echo "Docker Compose not found. Installing..."
            sudo curl -L "https://github.com/docker/compose/releases/download/v2.24.0/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
            DOCKER_COMPOSE_CMD="docker-compose"
          fi

          echo "Using command: $DOCKER_COMPOSE_CMD"

          # ===========================================
          # 2. 포트 충돌 방지를 위해 기존 컨테이너 정리
          # ===========================================
          echo "Compose file path: $COMPOSE_FILE"
          echo "Working directory: $(pwd)"

          echo "Removing previous deployment container if it exists..."
          sudo docker rm -f lattepanda-web-docker 2>/dev/null || true

          echo "Checking for containers already publishing port 8080..."
          PORT_8080_CONTAINERS=$(sudo docker ps -q --filter "publish=8080")
          if [ -n "$PORT_8080_CONTAINERS" ]; then
            echo "Stopping containers using host port 8080: $PORT_8080_CONTAINERS"
            sudo docker stop $PORT_8080_CONTAINERS || true
            sudo docker rm $PORT_8080_CONTAINERS || true
          else
            echo "No running Docker containers are using host port 8080."
          fi

          # ===========================================
          # 3. 홈 디렉토리에서 docker-compose 실행
          # ===========================================
          # (홈 디렉토리에는 gha-runner 사용자의 권한이 충분히 있음)
          echo "Stopping existing compose project..."
          sudo $DOCKER_COMPOSE_CMD -f "$COMPOSE_FILE" down || true

          # 새 컨테이너 빌드 및 실행
          echo "Starting deployment with Docker compose..."
          sudo $DOCKER_COMPOSE_CMD -f "$COMPOSE_FILE" up -d --build

          # ===========================================
          # 4. 배포 완료 후 원본 디렉토리에도 최종 결과 동기화 (선택)
          # ===========================================
          echo "Deployment completed in home directory"

      # 단계 5: 배포 완료 및 도커 실행 확인
      - name: Finish and Verify
        run: |
          echo "Safe deployment completed successfully!"
          echo "Docker container should be running on port 8080"
          # 도커 컨테이너 상태 확인 (선택)
          sudo docker ps --filter "name=lattepanda-web-docker" || echo "Docker verification completed"
