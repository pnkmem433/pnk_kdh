name: Zero-Touch Auto Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Target Folder and Sync Everything
        run: |
          # 1. 대상 경로 설정
          REPO_NAME="${{ github.event.repository.name }}"
          TARGET_PATH="/var/www/html/$REPO_NAME"
          
          echo "Target Path: $TARGET_PATH"

          # 2. 서버에 폴더가 없으면 생성
          if [ ! -d "$TARGET_PATH" ]; then
            echo "Creating folder: $TARGET_PATH"
            sudo mkdir -p "$TARGET_PATH"
            sudo chown -R $USER:$USER "$TARGET_PATH"
          fi

          # 3. 전체 파일 동기화 (rsync)
          # --exclude='.git*' 를 사용해 깃 설정 파일만 제외하고 
          # 내 PC의 현재 폴더(.) 내용을 서버의 대상 경로로 그대로 복사합니다.
          rsync -av --delete --exclude='.git*' ./ "$TARGET_PATH/"
          
      - name: Finish
        run: echo "Successfully mirrored all files to $TARGET_PATH"
