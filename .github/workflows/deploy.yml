name: "Zero-Touch Auto Deploy (Method 3: Safe Build)"

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Stage to Temp and Verify
        run: |
          TEMP_PATH="./temp_build"
          rm -rf $TEMP_PATH
          mkdir -p $TEMP_PATH
          
          # 1. 일단 모든 파일을 temp로 복사
          cp -r ./* $TEMP_PATH/ 2>/dev/null || true
          
          # 2. 제외하고 싶은 것들을 temp에서 삭제 (블랙리스트 방식)
          rm -rf $TEMP_PATH/.github        # 워크플로우 지시서 제외
          rm -rf $TEMP_PATH/.venv          # 가상환경 폴더 제외
          rm -rf $TEMP_PATH/README.md      # 설명문 제외
          rm -rf $TEMP_PATH/venv           # venv 폴더 제외
          
          # 3. 필수 파일 검증 (안전장치)
          if [ -s "$TEMP_PATH/index.html" ]; then
            echo "✅ index.html 검증 완료"
          else
            echo "❌ 에러: 필수 파일 누락"
            exit 1
          fi
          
          echo "Verification passed."

      - name: Final Deploy to Nginx
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          TARGET_PATH="/var/www/html/$REPO_NAME"
          TEMP_PATH="./temp_build"
          
          if [ ! -d "$TARGET_PATH" ]; then
            sudo mkdir -p "$TARGET_PATH"
            sudo chown -R $USER:$USER "$TARGET_PATH"
          fi
          
          rsync -av --delete --exclude='.git*' $TEMP_PATH/ "$TARGET_PATH/"

      - name: Finish
        run: echo "Safe deployment completed successfully!"
